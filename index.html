<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadow Poker</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="color:red;padding:40px;font-family:monospace;background:#111;min-height:100vh">' +
          '<h2>JS Error:</h2><pre>' + msg + '\n\nSource: ' + src + ':' + line + ':' + col +
          '\n\n' + (err && err.stack ? err.stack : '') + '</pre></div>';
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
